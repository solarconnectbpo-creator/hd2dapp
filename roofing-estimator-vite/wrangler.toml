# Cloudflare Pages — HD2D web app (Vite SPA)
# Canonical production for https://hardcoredoortodoorclosers.com (prefer Pages over Vercel for apex DNS).
#
# Deploy: `npm run pages:deploy` — builds, ensures Pages project `hd2d-closers` exists, uploads `dist/` (see scripts/pages-deploy.mjs).
# Manual create: `npm run pages:create` if you prefer not to use the script.
#
# Custom domains (Cloudflare Dashboard → Workers & Pages → hd2d-closers → Custom domains):
#   - Add apex: hardcoredoortodoorclosers.com
#   - Add www: www.hardcoredoortodoorclosers.com (optional; set redirect www → apex in Rules → Redirect Rules if you want one canonical host)
# DNS for the zone must be on Cloudflare; proxy (orange cloud) enabled for those records.
#
# API: `functions/api/*` proxies `/api/*` to Worker `hd2d-backend` (*.workers.dev). Backend zone routes for /api are disabled so Pages and Worker do not conflict.
#
# Optional Pages secrets (if Access blocks server fetch to workers.dev): HD2D_ACCESS_CLIENT_ID, HD2D_ACCESS_CLIENT_SECRET
#
# Build-time env: omit VITE_INTEL_API_BASE — see src/config/siteOrigin.ts

name = "hd2d-closers"
pages_build_output_dir = "dist"
