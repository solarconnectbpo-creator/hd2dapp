name = "hd2d-backend"
main = "src/index.ts"
compatibility_date = "2024-12-02"
compatibility_flags = ["nodejs_compat"]

workers_dev = true
preview_urls = true

# Public API hostname on your zone (no Access app on this host). Vercel: HD2D_WORKER_UPSTREAM=https://api.hardcoredoortodoorclosers.com
#
# Requires zone `hardcoredoortodoorclosers.com` on the **same** Cloudflare account as `wrangler login`.
# If deploy fails with "zone does not exist on your account" (10083), comment out `routes` below and attach
# `api.hardcoredoortodoorclosers.com` under Workers & Pages → hd2d-backend → Domains.
routes = [
  { pattern = "api.hardcoredoortodoorclosers.com", zone_name = "hardcoredoortodoorclosers.com", custom_domain = true },
]

# Retry Meta Page posts that failed Graph API (pending rows in D1).
[triggers]
# Meta retries every 10m; SMS workflow runs every minute (pending sms_workflow_runs).
crons = ["*/10 * * * *", "* * * * *"]

# `/api/*` on hardcoredoortodoorclosers.com is NOT routed here — it is served by Cloudflare Pages
# (`functions/api/*` proxies to this Worker’s *.workers.dev URL). That avoids Worker + Pages fighting
# the same path (530/HTML) and avoids cross-origin browser calls from *.pages.dev to the apex.
# Direct Worker URL remains https://hd2d-backend.<account>.workers.dev (see roofing-estimator-vite siteOrigin).

# Public EagleView API Center defaults (override with secrets if needed).
[vars]
# Public SPA origin — Meta OAuth callback, Stripe return URLs (must match live site; no trailing slash). Override in `.dev.vars` for local dev (e.g. http://127.0.0.1:5173).
APP_PUBLIC_ORIGIN = "https://hardcoredoortodoorclosers.com"
# Lead marketplace — must match Vercel VITE_LEAD_PACKAGES_JSON (see npm run stripe:setup-leads in roofing-estimator-vite).
LEADS_STRIPE_PRICE_IDS = "price_1TKaYpFLDUOzenNwUgcM7VFz,price_1TKac8FLDUOzenNwtgqkzl9i"
LEADS_BULK_PRICE_IDS = "price_1TKac8FLDUOzenNwtgqkzl9i"
LEADS_BULK_MIN_APPOINTMENTS = "10"
LEADS_BULK_FIXED_PRICE_IDS = "price_1TKac8FLDUOzenNwtgqkzl9i"
# Call center subscription ($3,500/mo) — POST /api/billing/callcenter-checkout-session
CALLCENTER_STRIPE_PRICE_ID = "price_1TKaarFLDUOzenNwvNMIWglo"
EAGLEVIEW_TOKEN_URL = "https://apicenter.eagleview.com/oauth2/v1/token"
EAGLEVIEW_API_BASE = "https://apicenter.eagleview.com"
# St. Louis County MO assessor parcels (public FeatureServer — same as backend/src/api/stlIntel.ts STL_ASSESSOR_PARCEL_LAYER).
# Override with your county’s FeatureServer …/FeatureServer/N if you work outside STL.
ARCGIS_FEATURE_LAYER_URL = "https://services6.arcgis.com/evmyRZRrsopdeog7/arcgis/rest/services/AssessorsParcels/FeatureServer/0"
# ArcGIS (Canvassing): optional MapServer tile template ARCGIS_MAPSERVER_TILE_URL (…/tile/{z}/{y}/{x}); token via `wrangler secret put ARCGIS_API_TOKEN`
# Built-in MO/IL parcel fallbacks in src/api/moIlParcelFallbackRegions.ts; optional var ARCGIS_EXTRA_PARCEL_FALLBACKS_JSON (see .dev.vars.example).
#
# --- DealMachine (Canvassing + Property records) — POST /api/dealmachine/property ---
# Key is a SECRET (never commit). Canvassing calls the Worker only; the browser never sees the key.
# 1) Production / deployed Worker (`npm run deploy` uses top-level `--env=""`):
#      npx wrangler secret put DEALMACHINE_API_KEY --env ""
#    Or: set shell env DEALMACHINE_API_KEY, then: npm run secret:dealmachine
# 2) Local `wrangler dev`: add DEALMACHINE_API_KEY to backend/.dev.vars (see .dev.vars.example).
# 3) SPA must call this Worker (same-origin or VITE_INTEL_API_BASE → your workers.dev / custom domain).
# Verify: GET /api/health → capabilities.dealmachineServerKey: true
# Optional non-secret overrides in [vars] below (uncomment if your account uses a different host or Bearer auth):
# DEALMACHINE_API_BASE = "https://public-api.dealmachine.com"
# DEALMACHINE_PROPERTY_PATH = "/v1/properties/search"
# DEALMACHINE_AUTH_MODE = "client_key"


# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "d2d"
database_id = "2a9b7931-181f-4b19-b963-97d00e9b6d5a"
migrations_dir = "migrations"

# KV Namespace for real-time call state
[[kv_namespaces]]
binding = "HD2D_CACHE"
id = "c534b1528e46480eab0979236a4b63ef"
preview_id = "d5629502b89544fd80f3e0880b352832"

# Environment variables
[env.development]
vars = { ENVIRONMENT = "development", EAGLEVIEW_TOKEN_URL = "https://apicenter.eagleview.com/oauth2/v1/token", EAGLEVIEW_API_BASE = "https://apicenter.eagleview.com", ARCGIS_FEATURE_LAYER_URL = "https://services6.arcgis.com/evmyRZRrsopdeog7/arcgis/rest/services/AssessorsParcels/FeatureServer/0" }

[env.production]
vars = { ENVIRONMENT = "production", EAGLEVIEW_TOKEN_URL = "https://apicenter.eagleview.com/oauth2/v1/token", EAGLEVIEW_API_BASE = "https://apicenter.eagleview.com", ARCGIS_FEATURE_LAYER_URL = "https://services6.arcgis.com/evmyRZRrsopdeog7/arcgis/rest/services/AssessorsParcels/FeatureServer/0" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "d2d"
database_id = "2a9b7931-181f-4b19-b963-97d00e9b6d5a"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "HD2D_CACHE"
id = "c534b1528e46480eab0979236a4b63ef"
preview_id = "d5629502b89544fd80f3e0880b352832"

# `npm run deploy` uses `--keep-vars true` so Variables set in the Cloudflare dashboard are not wiped on deploy.
# If you add LEADS_* / membership Price ids in `[vars]` below, they override dashboard values for those keys.
#
# Configure runtime secrets via Wrangler (target the Worker you deploy: `npm run deploy` uses top-level `--env=""`):
# - npx wrangler secret put SESSION_SECRET --env ""
# - npx wrangler secret put DEALMACHINE_API_KEY --env ""   (or: npm run secret:dealmachine with DEALMACHINE_API_KEY in env)
# Avoid putting secrets only on `--env production` unless you deploy that environment — that creates a separate Worker name.
# - npx wrangler secret put OPENAI_API_KEY --env production --config wrangler.toml
#
# Lead marketplace — POST /api/leads/checkout-session (Stripe Checkout):
# - wrangler secret put STRIPE_SECRET_KEY --env ""
# Non-secrets: LEADS_STRIPE_PRICE_IDS=price_single,price_bulk (all Stripe Price ids you use)
#   LEADS_BULK_PRICE_IDS=price_bulk  (subset that require min appointments per checkout; see LEADS_BULK_MIN_APPOINTMENTS)
#   LEADS_BULK_FIXED_PRICE_IDS=price_ten_pack_fixed  (optional: bulk Price is one line at fixed total, e.g. $1,970 — Stripe qty 1)
#   LEADS_BULK_MIN_APPOINTMENTS=10
#   APP_PUBLIC_ORIGIN=https://hardcoredoortodoorclosers.com  (no trailing slash; must match SPA URL)
# D1 migration 0009_marketplace_appointments.sql — run: npm run d1:migrate:remote
#
# EagleView API Center (TrueDesign) — /api/eagleview/apicenter/* on this Worker:
# - wrangler secret put EAGLEVIEW_CLIENT_SECRET
# - wrangler secret put EAGLEVIEW_CLIENT_ID   (or EAGLEVIEW_OAUTH_CLIENT_ID if it differs from the app URL slug)
# Optional secrets: EAGLEVIEW_TOKEN_URL (default https://apicenter.eagleview.com/oauth2/v1/token),
#   EAGLEVIEW_API_BASE (default https://apicenter.eagleview.com), EAGLEVIEW_SCOPE, EAGLEVIEW_ACCESS_TOKEN (static Bearer; dev only)
# EagleView Embedded Explorer token bootstrap — /api/eagleview/embedded/token on this Worker:
# - wrangler secret put EAGLEVIEW_EMBEDDED_CLIENT_ID
# - wrangler secret put EAGLEVIEW_EMBEDDED_CLIENT_SECRET
# Optional: EAGLEVIEW_EMBEDDED_TOKEN_URL (default https://api.eagleview.com/auth-service/v1/token), EAGLEVIEW_EMBEDDED_SCOPE
# Fallback if omitted: shared EAGLEVIEW_CLIENT_ID / EAGLEVIEW_CLIENT_SECRET are used.
#
# ML roof vision + SAM auto-trace — proxies /api/ai/roof-vision and /api/ai/roof-segment:
#   Deploy backend/ml-vision-service (see ml-vision-service/README.md; use Dockerfile.sam for SAM).
#   Then set (top-level worker — do not use --env production unless that is the worker you deploy):
#   - wrangler secret put ROOF_VISION_SERVICE_URL
#       → public HTTPS base only, e.g. https://your-service.fly.dev  (no trailing slash)
#   - wrangler secret put ROOF_VISION_SERVICE_SECRET  (optional but recommended)
#       → must match SERVICE_SECRET in the Python service .env / container env
# Local dev: point ROOF_VISION_SERVICE_URL at http://127.0.0.1:8090 in backend/.dev.vars
# Production: deploy ml-vision-service (e.g. Fly: `npm run deploy:vision:fly` from backend/ after `fly auth login`),
#   then from backend/: `npm run worker:set-roof-vision -- -BaseUrl "https://<app>.fly.dev" -SharedSecret "..."`
#
# Local dev: create backend/.dev.vars (gitignored) with the same KEY=value lines, then `npm run dev` in backend.
#
# Auth (D1 users table): after clone, from `backend/`: `npm run d1:migrate:local`
# Production D1 (once): `npm run d1:migrate:remote` (requires `wrangler login`).
# If remote commands fail with "Invalid format for Authorization header" / code 6003: remove or fix a bad
# CLOUDFLARE_API_TOKEN in your shell/environment, then run `wrangler login` (or set a token with D1 + Workers permissions).
# Optional Worker vars: AUTH_SIGNUP_ENABLED=false to disable public sign-up; SESSION_SECRET via `wrangler secret put SESSION_SECRET`.
# Env-based demo/admin/company/rep login (AUTH_* emails/passwords) requires AUTH_ENV_LOGIN_ENABLED=true — default is off (D1 + register only).
# Optional: AUTH_REQUIRE_DB_USER_FOR_ME=true so removed D1 users lose sessions on /api/auth/me (503 if D1 query fails).

# Build configuration
[build]
command = "npm install"

# Custom domain routing (see top-level `routes` for api subdomain).

