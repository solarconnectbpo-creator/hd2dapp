name = "hd2d-backend"
main = "src/index.ts"
compatibility_date = "2024-12-02"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "hd2d"
database_id = "local-dev"

# KV Namespace for real-time call state
[[kv_namespaces]]
binding = "HD2D_CACHE"
id = "hd2d-cache"
preview_id = "hd2d-cache-preview"

# Environment variables
[env.development]
vars = { ENVIRONMENT = "development" }

[env.production]
vars = { ENVIRONMENT = "production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "hd2d"
database_id = "local-dev"

[[env.production.kv_namespaces]]
binding = "HD2D_CACHE"
id = "hd2d-cache"
preview_id = "hd2d-cache-preview"

# Configure runtime secrets via Wrangler:
# - wrangler secret put OPENAI_API_KEY --env production --config backend/wrangler.toml
# - wrangler secret put SESSION_SECRET --env production --config backend/wrangler.toml

# Build configuration
[build]
command = "npm install"
