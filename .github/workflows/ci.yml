# HD2D — Cloudflare Worker (backend) + Vite SPA (roofing-estimator-vite)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  roofing-estimator-vite:
    name: roofing-estimator-vite (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roofing-estimator-vite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: roofing-estimator-vite/package-lock.json
      # `npm ci` can fail on Linux when the lockfile was refreshed on Windows with optional Tailwind/native entries; `npm install` respects the lockfile and completes install.
      - run: npm install --no-audit --no-fund
      - run: npm run test
      - run: npm run lint:ci
      - run: npm run build
      # Full-tree `npm run lint` still has known debt in App.tsx / older pages; `lint:ci` covers auth, shell, and touched libs.

  backend-worker:
    name: backend (wrangler build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
