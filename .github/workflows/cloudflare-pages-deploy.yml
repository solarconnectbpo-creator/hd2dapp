# Deploy roofing-estimator-vite → Cloudflare Pages project `hd2d-closers` (see roofing-estimator-vite/wrangler.toml).
# Repo secrets (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN — Account → Cloudflare Pages → Edit (or broader “Edit Cloudflare Workers” template)
#   CLOUDFLARE_ACCOUNT_ID — Workers overview → right column
name: Deploy Cloudflare Pages (web app)

on:
  push:
    branches: [main]
    paths:
      - "roofing-estimator-vite/**"
      - ".github/workflows/cloudflare-pages-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: roofing-estimator-vite/package-lock.json

      - name: Install and build
        working-directory: roofing-estimator-vite
        run: npm install --no-audit --no-fund && npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: roofing-estimator-vite
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name hd2d-closers
